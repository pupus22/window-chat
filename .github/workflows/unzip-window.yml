name: Unzip Window Project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project ZIP
        shell: bash
        run: |
          set -e

          # Prioritaskan ZIP Cloudinary kalau ada
          if [ -f "window-chat-cloudinary.zip" ]; then
            ZIP_FILE="window-chat-cloudinary.zip"
          else
            ZIP_FILE="$(ls *.zip 2>/dev/null | head -n 1 || true)"
          fi

          if [ -z "$ZIP_FILE" ]; then
            echo "Tidak ada file ZIP di repository."
            exit 1
          fi

          echo "ZIP ditemukan: $ZIP_FILE"

          # Simpan google-services.json asli Firebase agar tidak ketimpa
          if [ -f "app/google-services.json" ]; then
            mkdir -p /tmp/window_backup
            cp "app/google-services.json" "/tmp/window_backup/google-services.json"
            echo "google-services.json lama berhasil diamankan."
          else
            echo "Belum ada google-services.json lama untuk diamankan."
          fi

          rm -rf /tmp/window_unzip
          mkdir -p /tmp/window_unzip

          unzip -q "$ZIP_FILE" -d /tmp/window_unzip

          DIR_COUNT="$(find /tmp/window_unzip -mindepth 1 -maxdepth 1 -type d | wc -l)"
          FILE_COUNT="$(find /tmp/window_unzip -mindepth 1 -maxdepth 1 -type f | wc -l)"

          if [ "$DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            SRC_DIR="$(find /tmp/window_unzip -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          else
            SRC_DIR="/tmp/window_unzip"
          fi

          echo "Mengambil isi dari: $SRC_DIR"

          # Jangan extract .github dari ZIP,
          # karena GitHub Actions tidak boleh membuat workflow baru otomatis.
          rm -rf "$SRC_DIR/.github"

          # Jangan pakai google-services.json dari ZIP.
          # Kita pakai google-services.json asli Firebase yang sudah Mas pasang.
          rm -f "$SRC_DIR/app/google-services.json"

          # Bersihkan project lama, tapi jangan hapus folder .github
          rm -rf app
          rm -rf functions
          rm -f build.gradle
          rm -f settings.gradle
          rm -f firebase.json
          rm -f firestore.rules
          rm -f storage.rules
          rm -f README.md

          # Copy isi project baru
          rsync -a "$SRC_DIR"/ ./

          # Kembalikan google-services.json asli Firebase
          if [ -f "/tmp/window_backup/google-services.json" ]; then
            mkdir -p app
            cp "/tmp/window_backup/google-services.json" "app/google-services.json"
            echo "google-services.json asli Firebase dikembalikan."
          fi

          # Hapus semua ZIP dari repo setelah berhasil extract
          rm -f ./*.zip

      - name: Commit extracted files
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "Extract Window Cloudinary project files"
            git push
          fi
